<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>73 Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0f0a1e;--bg2:#1a1230;--card:rgba(255,255,255,0.06);--card-b:1px solid rgba(255,255,255,0.1);
--glass:rgba(255,255,255,0.08);--glass-b:1px solid rgba(255,255,255,0.12);
--t1:#f0e6ff;--t2:#c4b5d4;--t3:#8b7aa8;
--acc:#a855f7;--acc2:#7c3aed;--acc3:#c084fc;
--pink:#ec4899;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#6366f1;
--font:'Noto Sans KR','Orbitron',sans-serif;--font-d:'Orbitron','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);margin:0 auto;padding:0 16px 90px;min-height:100vh;
-webkit-tap-highlight-color:transparent;position:relative;overflow-x:hidden;
max-width:480px}
@media(min-width:768px){body{max-width:720px;padding:0 24px 90px}}
@media(min-width:1024px){body{max-width:900px;padding:0 32px 90px}}

/* Stars BG */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.1;transform:scale(0.8)}100%{opacity:var(--op);transform:scale(1.2)}}

button{cursor:pointer;font-family:inherit}input,textarea,select{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(168,85,247,0.15)}
.card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:var(--card-b);border-radius:16px;padding:14px;margin-bottom:8px;position:relative;z-index:1}
.btn{padding:8px 16px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:transform .15s,box-shadow .15s}
.btn:active{transform:scale(0.95)}
.bs{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--acc3);white-space:nowrap;flex-shrink:0}
.inp{padding:8px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:13px;background:rgba(255,255,255,0.06);color:var(--t1);width:100%}
.sel{padding:8px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:11px;background:rgba(255,255,255,0.06);color:var(--t1)}
.sel option{background:var(--bg2);color:var(--t1)}
.ta{width:100%;padding:8px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:12px;background:rgba(255,255,255,0.04);color:var(--t1);resize:none;line-height:1.6}
.nb{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--acc3);font-weight:600}

/* Tabs */
.tabs{display:flex;background:rgba(15,10,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.08);
border-radius:0;padding:4px 8px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100}
@media(min-width:768px){.tabs{max-width:720px}}
@media(min-width:1024px){.tabs{max-width:900px}}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border:none;border-radius:10px;background:transparent;color:var(--t3);font-size:8px;font-weight:600;transition:all .2s}
.tab.on{background:rgba(168,85,247,0.15);color:var(--acc)}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) scale(0);background:linear-gradient(135deg,var(--acc2),var(--pink));color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.2s}
.toast.v{transform:translateX(-50%) scale(1)}
.hd{display:none!important}

/* Sub tabs */
.st{flex:1;padding:8px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;background:rgba(255,255,255,0.04);color:var(--t3);font-size:12px;font-weight:700;text-align:center;transition:all .2s}
.st.on{border-color:var(--acc);background:rgba(168,85,247,0.15);color:var(--acc)}

/* Day picker */
.dp-on{background:var(--acc2)!important;color:#fff!important;border:none!important}
.dp-off{background:rgba(255,255,255,0.06)!important;color:var(--t3)!important;border:1px solid rgba(255,255,255,0.12)!important}
.drag-over{background:rgba(168,85,247,0.15)!important;border-color:var(--acc)!important}

/* Animations */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .25s ease both}
@keyframes lu{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.check-anim{animation:checkPop .3s ease both}
@keyframes shootStar{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(60px,-60px) scale(0);opacity:0}}
.shoot-star{position:absolute;width:4px;height:4px;background:var(--acc);border-radius:50%;animation:shootStar .5s ease-out forwards;pointer-events:none;z-index:50}
@keyframes rocketLaunch{0%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(-80px) scale(1.2);opacity:1}100%{transform:translateY(-200px) scale(0.5);opacity:0}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Undo toast */
.undo-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(30,20,50,0.95);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.15);color:var(--t1);padding:8px 16px;border-radius:12px;font-size:12px;z-index:9998;display:flex;align-items:center;gap:8px}
.undo-btn{background:var(--acc);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700}

/* Collapsible journal */
.journal-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;transition:all .2s}
.journal-toggle:hover{background:rgba(255,255,255,0.08)}
.journal-body{overflow:hidden;transition:max-height .3s ease;max-height:0}
.journal-body.open{max-height:300px}

/* Timer */
.timer-ring{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.timer-ring svg{position:absolute;transform:rotate(-90deg)}
.timer-text{font-size:9px;font-weight:700;color:var(--acc3);font-family:var(--font-d);z-index:1}

/* Skip button */
.skip-btn{padding:2px 6px;border-radius:5px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-size:9px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.skip-btn:hover{background:rgba(255,255,255,0.12)}
.skipped{opacity:0.4;text-decoration:line-through}

/* Level overlay */
#lvl-overlay{position:fixed;inset:0;z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column}
#lvl-overlay .lvl-bg{position:absolute;inset:0}

/* Responsive grid */
@media(min-width:768px){
  .resp-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .resp-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
}
@media(min-width:1024px){
  .resp-grid-2{grid-template-columns:1fr 1fr}
  .resp-grid-3{grid-template-columns:1fr 1fr 1fr}
}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.3);border-radius:2px}
</style>
</head>

function t(k){return TX[L][k]||k;}
function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function pk(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function gdd(k){return D.days[k]||{rc:{},todos:[],mood:null,journal:"",skips:{}};}
function gL(p){var l=LV[0];LV.forEach(function(x){if(p>=x.m)l=x;});return l;}
function nLL(p){for(var i=0;i<LV.length;i++){if(p<LV[i].m)return LV[i];}return null;}
function ln(l){return l.icon+" "+(l[L]||l.en);}
function tli(p){if(p>=80)return{c:"var(--green)",cr:"#22c55e",b:"rgba(34,197,94,0.15)"};if(p>=50)return{c:"var(--amber)",cr:"#f59e0b",b:"rgba(245,158,11,0.15)"};if(p>0)return{c:"var(--red)",cr:"#ef4444",b:"rgba(239,68,68,0.15)"};return{c:"var(--t3)",cr:"#8b7aa8",b:"rgba(255,255,255,0.04)"};}
function rFor(d){var w=d.getDay();return D.routines.filter(function(r){return(r.days||AD).indexOf(w)>=0;});}
function comp(k){
  var d=pk(k),dy=gdd(k),ap=rFor(d);
  var skips=dy.skips||{};
  var activeR=ap.filter(function(r){return !skips[r.id];});
  var r=activeR.filter(function(x){return dy.rc&&dy.rc[x.id];}).length;
  var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;
  var tot=activeR.length+(dy.todos||[]).length;
  return{d:r+t2,t:tot,p:tot>0?Math.round((r+t2)/tot*100):0};
}
function gSk(){var s=0,d=new Date(td);while(s<400){var c=comp(dk(d));if(c.t===0||c.p<50)break;s++;d.setDate(d.getDate()-1);}return s;}
function rSk(rid){var s=0,d=new Date(td);var rt=D.routines.find(function(r){return r.id===rid;});if(!rt)return 0;var rd=rt.days||AD;while(s<400){if(rd.indexOf(d.getDay())<0){d.setDate(d.getDate()-1);continue;}var dy=gdd(dk(d));if(dy.skips&&dy.skips[rid]){d.setDate(d.getDate()-1);continue;}if(!dy.rc||!dy.rc[rid])break;s++;d.setDate(d.getDate()-1);}return s;}
function fmtD(d){var dw=DW[L],mo=MN[L];return L==="en"?mo[d.getMonth()]+" "+d.getDate()+" ("+dw[d.getDay()]+")":(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+dw[d.getDay()]+")";}
function toast(m){var e=$("toast");e.textContent=m;e.classList.add("v");setTimeout(function(){e.classList.remove("v");},1800);}
function dLbl(days){if(!days||days.length===7)return t("daily");if(days.length===5&&[1,2,3,4,5].every(function(d){return days.indexOf(d)>=0;}))return t("weekday");if(days.length===2&&days.indexOf(0)>=0&&days.indexOf(6)>=0)return t("weekend");return days.map(function(d){return DW[L][d];}).join("·");}
function wsOf(d){var x=new Date(d),w=x.getDay();x.setDate(x.getDate()-w+(w===0?-6:1));x.setHours(0,0,0,0);return x;}
function fmtTime(sec){var m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function totalTimerMins(){var total=0;D.routines.forEach(function(r){if(r.timer)total+=r.timer;});return total;}

// ===== DEBOUNCED SAVE =====
function saveNow(){
  clearTimeout(saveTimer);
  localStorage.setItem("73r",JSON.stringify({nk:nk,fk:fk,L:L,D:D}));
  if(!fb||!nk)return;
  var tk=dk(td),dy=gdd(tk),ap=rFor(td);
  var skips=dy.skips||{};
  var activeR=ap.filter(function(r){return !skips[r.id];});
  var rd=activeR.filter(function(r){return dy.rc&&dy.rc[r.id];}).length;
  var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;
  var tot=activeR.length+(dy.todos||[]).length;
  var pct=tot>0?Math.round((rd+t2)/tot*100):0;
  fb.ref("users/"+nk).set({nk:nk,pct:pct,sk:gSk(),pts:D.pts||0,lvl:ln(gL(D.pts||0)),
    routines:D.routines.map(function(r){return{name:r.name,cat:r.cat||"health",slot:r.slot||"morning"};}),
    todos:(dy.todos||[]).map(function(x){return{text:x.text,done:x.done};}),
    journals:Object.keys(D.days).filter(function(k){return D.days[k].journal;}).sort().reverse().slice(0,5).map(function(k){var v=D.days[k];return{date:k,text:v.journal,mood:v.mood};}),
    ts:Date.now()});
}
function save(){saveNow();}
function saveLater(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,1000);}

var dragIdx=null;

function dLeave(e){e.currentTarget.classList.remove("drag-over");}
function dDrop(e,i){e.currentTarget.classList.remove("drag-over");if(dragIdx===null||dragIdx===i){dragIdx=null;return;}var a=[].concat(D.routines);var mv=a.splice(dragIdx,1)[0];a.splice(i,0,mv);D.routines=a;dragIdx=null;save();render();}
function dEnd(e){e.target.style.opacity="1";dragIdx=null;document.querySelectorAll(".drag-over").forEach(function(el){el.classList.remove("drag-over");});}
function moveR(idx,dir){var ni=idx+dir;if(ni<0||ni>=D.routines.length)return;var a=[].concat(D.routines);var tmp=a[idx];a[idx]=a[ni];a[ni]=tmp;D.routines=a;save();render();}

function moveTdTmrw(k,tid){if(!D.days[k])return;var td2=D.days[k].todos.find(function(x){return x.id===tid;});if(!td2)return;var nx=new Date(pk(k));nx.setDate(nx.getDate()+1);var nk2=dk(nx);if(!D.days[nk2])D.days[nk2]={rc:{},todos:[],mood:null,journal:"",skips:{}};if(!D.days[nk2].todos)D.days[nk2].todos=[];D.days[nk2].todos.push({id:String(Date.now()),text:td2.text,done:false});D.days[k].todos=D.days[k].todos.filter(function(x){return x.id!==tid;});save();render();toast("→ "+fmtD(nx));}

// Toggle routine with shooting star
function togR(k,rid){
  var dy=gdd(k);if(!D.days[k])D.days[k]=Object.assign({},dy);if(!D.days[k].rc)D.days[k].rc={};
  var was=D.days[k].rc[rid];D.days[k].rc[rid]=!was;
  D.pts=was?Math.max(0,(D.pts||0)-2):(D.pts||0)+2;
  if(!was)chkLv(D.pts-2,D.pts);
  save();render();
  // Shooting star effect
  if(!was){var btn=event&&event.target;if(btn){var rect=btn.getBoundingClientRect();for(var i=0;i<3;i++){var star=document.createElement("div");star.className="shoot-star";star.style.left=rect.left+rect.width/2+"px";star.style.top=rect.top+"px";star.style.animationDelay=i*0.1+"s";document.body.appendChild(star);setTimeout(function(s){s.remove()},800,star);}}}
  // Check 100%
  var sc=comp(k);if(sc.p===100&&sc.t>0)showRocket();
}

// Skip routine
function skipR(k,rid){
  if(!D.days[k])D.days[k]={rc:{},todos:[],mood:null,journal:"",skips:{}};
  if(!D.days[k].skips)D.days[k].skips={};
  var was=D.days[k].skips[rid];
  D.days[k].skips[rid]=!was;
  if(was&&D.days[k].rc&&D.days[k].rc[rid]){/* unskipping, keep check */}
  save();render();
  if(!was)toast(t("skipped")+" ⏭");
}

// ===== TIMER =====
function startTimer(rid){
  var r=D.routines.find(function(x){return x.id===rid;});if(!r||!r.timer)return;
  if(activeTimers[rid]){clearInterval(activeTimers[rid].interval);delete activeTimers[rid];render();return;}
  var dur=r.timer*60;
  activeTimers[rid]={start:Date.now(),dur:dur,remaining:dur};
  activeTimers[rid].interval=setInterval(function(){
    var at=activeTimers[rid];if(!at)return;
    at.remaining=at.dur-Math.floor((Date.now()-at.start)/1000);
    if(at.remaining<=0){clearInterval(at.interval);delete activeTimers[rid];toast("⏰ "+r.name+" "+t("timerDone"));
      if(navigator.vibrate)navigator.vibrate([200,100,200]);render();return;}
    var el=$("tm-"+rid);if(el)el.textContent=fmtTime(at.remaining);
    var svg=document.querySelector("#tmr-"+rid+" circle.prog");
    if(svg){var pct=at.remaining/at.dur;svg.style.strokeDashoffset=88-(88*pct);}
  },1000);render();
}

// Level up check with themed effects
function chkLv(op,np){
  var ol=gL(op),nl=gL(np);
  if(nl.m>ol.m){
    var ov=$("lvl-overlay"),bg=$("lvl-bg");
    $("lvl-icon").textContent=nl.icon;
    $("lvl-txt").textContent=t("lvlUp")+" — "+(nl[L]||nl.en);
    $("lvl-desc").textContent=nl["desc_"+L]||nl.desc_en;
    // Themed background
    var bgStyle="background:rgba(15,10,30,0.95);";
    if(nl.eff==="dim")bgStyle="background:linear-gradient(180deg,#1a1a2e,#0a0a15);";
    if(nl.eff==="launch")bgStyle="background:linear-gradient(180deg,#0a0a2e,#1a0530);";
    if(nl.eff==="alarm")bgStyle="background:linear-gradient(180deg,#2a0a0a,#1a0a20);";
    if(nl.eff==="firework")bgStyle="background:linear-gradient(180deg,#1a0a30,#0a1a30);";
    if(nl.eff==="finale")bgStyle="background:linear-gradient(180deg,#2a1a00,#1a0a20);";
    bg.style.cssText=bgStyle;
    ov.classList.remove("hd");
    setTimeout(function(){ov.classList.add("hd");},3500);
  }
}

        h+='<div class="card" style="border:1.5px solid var(--acc);margin-bottom:4px">';
        h+='<div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap">';
        h+='<input class="inp" id="ed-nm" value="'+esc(r.name)+'" style="flex:1 1 80px">';
        h+='<input class="inp" id="ed-timer" type="number" value="'+(r.timer||"")+'" placeholder="'+t("timerPH")+'" style="width:80px;flex-shrink:0" min="0">';
        h+='<select class="sel" id="ed-cat">';CA.forEach(function(c){h+='<option value="'+c.id+'"'+(c.id===(r.cat||"health")?" selected":"")+'>'+c.icon+' '+t(c.id)+'</option>';});h+='</select>';
        h+='<select class="sel" id="ed-slot">';SL.forEach(function(s){h+='<option value="'+s.id+'"'+(s.id===(r.slot||"morning")?" selected":"")+'>'+s.icon+' '+t(s.id)+'</option>';});h+='</select></div>';
        h+='<div style="display:flex;gap:3px;margin-bottom:8px">';
        var rdays=r.days||AD;
        DW[L].forEach(function(n,i){var on=rdays.indexOf(i)>=0;h+='<button class="edp-d '+(on?"dp-on":"dp-off")+'" data-d="'+i+'" onclick="togDP(this)" style="flex:1;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:none">'+n+'</button>';});
        h+='</div><div style="display:flex;gap:4px"><button class="btn" onclick="saveEdit(\''+r.id+'\')" style="flex:1">'+t("save")+'</button><button class="bs" onclick="cancelEdit()" style="flex:1;padding:8px">'+t("cancel")+'</button></div></div>';
      } else {
        h+='<div draggable="true" ondragstart="dStart(event,'+idx+')" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'+idx+')" ondragend="dEnd(event)" style="display:flex;align-items:center;gap:6px;padding:10px;background:var(--card);border:var(--card-b);border-radius:10px;margin-bottom:4px">';
        h+='<div style="display:flex;flex-direction:column;gap:2px">';
        if(idx>0)h+='<button onclick="moveR('+idx+',-1)" style="background:rgba(168,85,247,0.15);border:none;border-radius:4px;padding:2px 6px;font-size:10px;color:var(--acc);line-height:1">▲</button>';
        else h+='<span style="padding:2px 6px;font-size:10px;color:transparent;line-height:1">▲</span>';
        if(idx<D.routines.length-1)h+='<button onclick="moveR('+idx+',1)" style="background:rgba(168,85,247,0.15);border:none;border-radius:4px;padding:2px 6px;font-size:10px;color:var(--acc);line-height:1">▼</button>';
        else h+='<span style="padding:2px 6px;font-size:10px;color:transparent;line-height:1">▼</span>';
        h+='</div>';
        h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;flex-wrap:wrap">';
        h+='<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:'+cat.c+'20;color:'+cat.c+';font-weight:700">'+cat.icon+t(cat.id)+'</span>';
        h+='<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:'+sl.c+'20;color:'+sl.c+';font-weight:700">'+sl.icon+t(sl.id)+'</span>';
        if(r.timer)h+='<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(168,85,247,0.15);color:var(--acc3);font-weight:700">⏱'+r.timer+t("mins")+'</span>';
        h+='</div>';
        h+='<span style="font-size:13px;color:var(--t1);font-weight:500">'+esc(r.name)+'</span>';
        h+='<div style="font-size:10px;color:var(--acc3);margin-top:1px">'+dLbl(r.days)+'</div></div>';
        if(rs>0)h+='<span style="font-size:10px;color:var(--acc);font-weight:700">🔥'+rs+'</span>';
        h+='<button class="bs" onclick="startEdit(\''+r.id+'\')">✏️</button>';
        h+='<button class="bs" onclick="rmR(\''+r.id+'\')" style="color:var(--red)">🗑</button></div>';}
    });
    h+='</div></div>';
  }

  // ======= SOCIAL =======
  if(curT==="social"){
    h+='<div class="fi">';
    if(mCh.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px">💌 '+t("cheerFor")+'</p><div style="display:flex;flex-wrap:wrap;gap:4px">';
      mCh.slice(-10).reverse().forEach(function(c){h+='<span style="padding:4px 8px;border-radius:8px;background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.2);font-size:12px">'+c.em+' <span style="font-size:10px;color:var(--t3)">'+esc(c.from)+'</span></span>';});h+='</div></div>';}
    if(!fD){h+='<div class="card" style="text-align:center;padding:24px"><span style="font-size:40px">👥</span><p style="color:var(--t3);font-size:13px;margin-top:8px">'+t("noFr")+'</p><button class="bs" onclick="chgFr()" style="margin-top:8px;padding:6px 16px">'+t("connect")+'</button></div>';}
    else{
      var ftl=tli(fD.pct);
      h+='<div class="card" style="background:linear-gradient(135deg,rgba(249,115,22,0.1),rgba(236,72,153,0.1))">';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
      h+='<div><p style="font-size:16px;font-weight:800;color:var(--t1)">'+esc(fD.nk)+'</p><p style="font-size:11px;color:var(--t3)">'+(fD.lvl||"")+'</p>';
      if(fD.ts)h+='<p style="font-size:9px;color:var(--t3)">'+t("lastSeen")+': '+fmtAgo(fD.ts)+'</p>';
      h+='</div>';
      h+='<div style="display:flex;align-items:center;gap:8px"><div style="width:48px;height:48px;border-radius:50%;background:'+ftl.b+';display:flex;align-items:center;justify-content:center;border:2px solid '+ftl.cr+'"><span style="font-size:14px;font-weight:900;color:'+ftl.cr+';font-family:var(--font-d)">'+fD.pct+'%</span></div>';
      if(fD.sk>0)h+='<div style="text-align:center">🔥<p style="font-size:14px;font-weight:800;color:var(--amber)">'+fD.sk+'</p></div>';
      h+='</div></div><p style="font-size:11px;color:var(--t3);margin-bottom:4px">'+t("sendCh")+'</p><div style="display:flex;gap:4px">';
      CH.forEach(function(c){h+='<button onclick="sendCh(\''+c+'\')" style="font-size:20px;padding:4px 8px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1)">'+c+'</button>';});
      h+='</div></div>';

      // Comparison
      h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">⚡ '+t("comp")+'</p><div style="display:flex;gap:8px"><div style="flex:1;text-align:center;padding:10px;border-radius:10px;background:rgba(168,85,247,0.1)"><p style="font-size:10px;color:var(--acc);font-weight:600">'+esc(nk)+'</p><p style="font-size:22px;font-weight:900;color:var(--acc);font-family:var(--font-d)">'+comp(dk(td)).p+'%</p><p style="font-size:10px;color:var(--acc3)">🔥'+gSk()+t("dS")+'</p></div><div style="display:flex;align-items:center;font-size:18px">⚡</div><div style="flex:1;text-align:center;padding:10px;border-radius:10px;background:rgba(249,115,22,0.1)"><p style="font-size:10px;color:var(--amber);font-weight:600">'+esc(fD.nk)+'</p><p style="font-size:22px;font-weight:900;color:var(--amber);font-family:var(--font-d)">'+fD.pct+'%</p><p style="font-size:10px;color:var(--amber)">🔥'+fD.sk+t("dS")+'</p></div></div></div>';

      // Friend routines
      if(fD.routines&&fD.routines.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px">📋 '+esc(fD.nk)+' '+t("fR")+'</p>';
        fD.routines.forEach(function(r){var cat=CA.find(function(c){return c.id===r.cat;})||CA[0];h+='<div style="display:flex;align-items:center;gap:4px;padding:4px 7px;background:rgba(255,255,255,0.04);border-radius:6px;margin-bottom:2px"><span style="font-size:8px;padding:1px 3px;border-radius:3px;background:'+cat.c+'20;color:'+cat.c+';font-weight:700">'+cat.icon+'</span><span style="font-size:11px;color:var(--t1)">'+esc(r.name)+'</span></div>';});h+='</div>';}

      // Friend todos
      if(fD.todos&&fD.todos.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px">📝 '+esc(fD.nk)+' '+t("fT")+'</p>';
        fD.todos.forEach(function(x){h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 7px;background:'+(x.done?"rgba(168,85,247,0.08)":"rgba(255,255,255,0.02)")+';border-radius:6px;margin-bottom:2px"><span style="width:14px;height:14px;border-radius:4px;'+(x.done?"background:var(--acc);":"border:2px solid rgba(255,255,255,0.2);")+'display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#fff">'+(x.done?"✓":"")+'</span><span style="font-size:11px;color:'+(x.done?"var(--acc3)":"var(--t1)")+';text-decoration:'+(x.done?"line-through":"none")+'">'+esc(x.text)+'</span></div>';});h+='</div>';}

      // Friend journals with comments
      if(fD.journals&&fD.journals.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px">✍️ '+esc(fD.nk)+' '+t("fN")+'</p>';
        fD.journals.forEach(function(j,ji){var cid="fc-"+ji;h+='<div style="padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border-left:3px solid var(--acc);margin-bottom:6px"><p style="font-size:10px;color:var(--acc3);font-weight:600">'+fmtD(pk(j.date))+' '+(j.mood||"")+'</p><p style="font-size:12px;color:var(--t2);margin-top:2px;line-height:1.5">'+esc(j.text)+'</p><div style="display:flex;gap:4px;margin-top:6px"><input class="inp" style="font-size:11px" placeholder="'+t("cmtPH")+'" id="'+cid+'"><button class="btn" onclick="sendCmt(\''+j.date+'\',\''+cid+'\')">'+t("send")+'</button></div></div>';});h+='</div>';}

      // My comments on friend's journals
      var myArr=[];
      Object.keys(myCmts).forEach(function(dateK){var cs=myCmts[dateK];Object.values(cs).forEach(function(c){if(c.from===nk)myArr.push({date:dateK,text:c.text,ts:c.ts});});});
      myArr.sort(function(a,b){return(b.ts||0)-(a.ts||0);});
      if(myArr.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px">💬 '+t("myCmts")+'</p>';
        myArr.slice(0,10).forEach(function(c){h+='<div style="padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;margin-bottom:3px;font-size:11px"><span style="color:var(--t3)">'+fmtD(pk(c.date))+'</span> <span style="color:var(--t2)">'+esc(c.text)+'</span></div>';});
        h+='</div>';}
    }
    h+='</div>';
  }

  // ======= STATS =======
  if(curT==="stats"){
    h+='<div class="fi">';
    var lv2=gL(D.pts||0),nl2=nLL(D.pts||0);
    h+='<div class="card" style="text-align:center;background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(236,72,153,0.1))"><div style="font-size:48px">'+lv2.icon+'</div><h3 style="font-size:16px;font-weight:900;color:var(--acc);font-family:var(--font-d)">'+(lv2[L]||lv2.en)+'</h3><p style="font-size:11px;color:var(--t3);margin-top:6px">'+t("tPts").replace("{n}",D.pts||0)+'</p>';
    if(nl2)h+='<p style="font-size:10px;color:var(--t3);margin-top:2px">'+t("nLvl").replace("{n}",nl2.m-(D.pts||0))+'</p>';
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
    h+='<div class="card" style="text-align:center"><span style="font-size:28px">🔥</span><p style="font-size:24px;font-weight:900;color:var(--acc);font-family:var(--font-d)">'+gSk()+'</p><p style="font-size:10px;color:var(--t3)">'+t("streak")+'</p></div>';
    h+='<div class="card" style="text-align:center"><span style="font-size:28px">📅</span><p style="font-size:24px;font-weight:900;color:var(--pink);font-family:var(--font-d)">'+Object.keys(D.days).filter(function(k){return comp(k).p>=50;}).length+'</p><p style="font-size:10px;color:var(--t3)">'+t("tDays")+'</p></div></div>';
    h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">📊 '+t("last7")+'</p><div style="display:flex;align-items:flex-end;justify-content:center;gap:6px;height:110px;padding:6px 0">';
    for(var i2=0;i2<7;i2++){var d2=new Date(td);d2.setDate(d2.getDate()-6+i2);var p2=comp(dk(d2)).p,tl4=tli(p2);
      h+='<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1"><span style="font-size:8px;font-weight:700;color:'+tl4.cr+'">'+(p2>0?p2+"%":"")+'</span><div style="width:100%;max-width:26px;height:'+Math.max(4,p2)+'%;border-radius:5px;background:'+(p2>0?tl4.cr:"rgba(255,255,255,0.06)")+';transition:height .4s"></div><span style="font-size:9px;color:'+(dk(d2)===dk(td)?"var(--acc)":"var(--t3)")+';font-weight:'+(dk(d2)===dk(td)?700:400)+'">'+DW[L][d2.getDay()]+'</span></div>';}
    h+='</div></div>';
    if(D.routines.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">🔥 '+t("rStr")+'</p>';
      D.routines.forEach(function(r){var rs=rSk(r.id),cat=CA.find(function(c){return c.id===(r.cat||"health");})||CA[0];
        h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:9px;padding:1px 5px;border-radius:4px;background:'+cat.c+'20;color:'+cat.c+';font-weight:700">'+cat.icon+t(cat.id)+'</span><span style="font-size:12px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.name)+'</span><span style="font-size:13px;font-weight:800;color:'+(rs>0?"var(--acc)":"var(--t3)")+'">'+(rs>0?"🔥"+rs+t("dS"):"—")+'</span></div>';});
      h+='</div>';}
    var jnls=Object.keys(D.days).filter(function(k){return D.days[k].journal;}).sort().reverse().slice(0,5);
    if(jnls.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">✍️ '+t("rNotes")+'</p>';
      jnls.forEach(function(k){var v=D.days[k];h+='<div style="padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border-left:3px solid var(--acc);margin-bottom:6px"><p style="font-size:10px;color:var(--acc3);font-weight:600">'+fmtD(pk(k))+' '+(v.mood||"")+'</p><p style="font-size:12px;color:var(--t2);margin-top:2px;line-height:1.5">'+esc(v.journal)+'</p></div>';});
      h+='</div>';}
    h+='</div>';
  }
  ct.innerHTML=h;
}

load();
</script>
</body>
</html>
