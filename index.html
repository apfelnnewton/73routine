<style>
:root{
--bg:#0f0a1e;--bg2:#1a1230;--card:rgba(255,255,255,0.03);--card-b:1px solid rgba(255,255,255,0.1);
--glass:rgba(255,255,255,0.05);--glass-b:1px solid rgba(255,255,255,0.12);
--t1:#f0e6ff;--t2:#c4b5d4;--t3:#8b7aa8;
--acc:#a855f7;--acc2:#7c3aed;--acc3:#c084fc;
--pink:#ec4899;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#6366f1;
--font:'Noto Sans KR','Orbitron',sans-serif;--font-d:'Orbitron','Noto Sans KR',sans-serif;
--stars-display:block;
}
.light{
--bg:#eee5ff;--bg2:#e0d0ff;--card:rgba(255,255,255,0.55);--card-b:1px solid rgba(168,85,247,0.12);
--glass:rgba(255,255,255,0.5);--glass-b:1px solid rgba(168,85,247,0.15);
--t1:#1a1230;--t2:#4b3a6b;--t3:#8b7aa8;
--acc:#7c3aed;--acc2:#6d28d9;--acc3:#a855f7;
--pink:#db2777;--green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#4f46e5;
--stars-display:block;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);margin:0 auto;padding:0 16px 90px;min-height:100vh;
-webkit-tap-highlight-color:transparent;position:relative;overflow-x:hidden;
max-width:480px;transition:background .3s,color .3s}
@media(min-width:768px){body{max-width:720px;padding:0 24px 90px}}
@media(min-width:1024px){body{max-width:900px;padding:0 32px 90px}}

/* Stars BG */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;display:var(--stars-display)}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.1;transform:scale(0.8)}100%{opacity:var(--op);transform:scale(1.2)}}
/* Aurora gradient blobs - gives blur something to work with */
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(90px);animation:auroraFloat 12s ease-in-out infinite alternate}
.aurora-blob:nth-child(1){width:350px;height:350px;background:radial-gradient(circle,rgba(30,64,175,0.7),transparent 70%);top:-5%;left:-10%;opacity:0.5;animation-duration:14s}
.aurora-blob:nth-child(2){width:300px;height:300px;background:radial-gradient(circle,rgba(14,116,144,0.6),transparent 70%);bottom:5%;right:-5%;opacity:0.4;animation-duration:18s;animation-delay:-4s}
.aurora-blob:nth-child(3){width:250px;height:250px;background:radial-gradient(circle,rgba(245,158,11,0.35),transparent 70%);top:45%;left:55%;opacity:0.3;animation-duration:16s;animation-delay:-8s}
@keyframes auroraFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.15)}100%{transform:translate(-20px,30px) scale(0.9)}}
.light .aurora-blob:nth-child(1){background:radial-gradient(circle,rgba(196,181,212,0.5),transparent 70%);opacity:0.35}
.light .aurora-blob:nth-child(2){background:radial-gradient(circle,rgba(251,191,210,0.4),transparent 70%);opacity:0.3}
.light .aurora-blob:nth-child(3){background:radial-gradient(circle,rgba(165,200,255,0.4),transparent 70%);opacity:0.25}

button{cursor:pointer;font-family:inherit}input,textarea,select{font-family:inherit}
/* Satellite flyby */
.satellite{position:fixed;z-index:0;pointer-events:none;opacity:0;mix-blend-mode:screen}
.satellite img{width:100%;height:100%;object-fit:contain}
.light .satellite{display:none}
@keyframes satPath{
  0%{offset-distance:0%;opacity:0}
  5%{opacity:0.6}
  50%{opacity:0.8}
  95%{opacity:0.6}
  100%{offset-distance:100%;opacity:0}
}

input:focus,textarea:focus,select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(168,85,247,0.15)}
.card{background:var(--card);backdrop-filter:blur(32px) saturate(170%);-webkit-backdrop-filter:blur(32px) saturate(170%);border:var(--card-b);border-top:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:14px;margin-bottom:8px;position:relative;z-index:1;box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.05)}
.btn{padding:8px 16px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:transform .15s,box-shadow .15s}
.btn:active{transform:scale(0.95)}
.bs{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--acc3);white-space:nowrap;flex-shrink:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.inp{padding:8px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:13px;background:rgba(255,255,255,0.07);color:var(--t1);width:100%;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.sel{padding:8px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:11px;background:rgba(255,255,255,0.07);color:var(--t1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.sel option{background:var(--bg2);color:var(--t1)}
.ta{width:100%;padding:8px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:12px;background:rgba(255,255,255,0.04);color:var(--t1);resize:none;line-height:1.6}
.nb{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--acc3);font-weight:600;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

/* Tabs */
.tabs{display:flex;background:rgba(15,10,30,0.35);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border-top:1px solid rgba(255,255,255,0.1);
border-radius:0;padding:4px 8px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;transition:background .3s;box-shadow:0 -4px 20px rgba(0,0,0,0.3)}
@media(min-width:768px){.tabs{max-width:720px}}
@media(min-width:1024px){.tabs{max-width:900px}}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border:none;border-radius:10px;background:transparent;color:var(--t3);font-size:10px;font-weight:600;transition:all .2s}
.tab.on{background:rgba(168,85,247,0.18);color:var(--acc);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1)}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) scale(0);background:linear-gradient(135deg,rgba(124,58,237,0.85),rgba(236,72,153,0.85));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;transition:transform 0.2s;box-shadow:0 4px 20px rgba(124,58,237,0.3);border:1px solid rgba(255,255,255,0.15)}
.toast.v{transform:translateX(-50%) scale(1)}
.hd{display:none!important}

/* Sub tabs */
.st{flex:1;padding:8px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;background:rgba(255,255,255,0.06);color:var(--t3);font-size:12px;font-weight:700;text-align:center;transition:all .2s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.st.on{border-color:var(--acc);background:rgba(168,85,247,0.18);color:var(--acc);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1)}

/* Day picker */
.dp-on{background:var(--acc2)!important;color:#fff!important;border:none!important}

function t(k){return TX[L][k]||k;}
function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function pk(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function gdd(k){if(!D.days)D.days={};return D.days[k]||{rc:{},todos:[],mood:null,journal:"",skips:{}};}
function gL(p){var l=LV[0];LV.forEach(function(x){if(p>=x.m)l=x;});return l;}
function nLL(p){for(var i=0;i<LV.length;i++){if(p<LV[i].m)return LV[i];}return null;}
function ln(l){return l.icon+" "+(l[L]||l.en);}
function tli(p){if(p>=80)return{c:"var(--green)",cr:"#22c55e",b:"rgba(34,197,94,0.15)"};if(p>=50)return{c:"var(--amber)",cr:"#f59e0b",b:"rgba(245,158,11,0.15)"};if(p>0)return{c:"var(--red)",cr:"#ef4444",b:"rgba(239,68,68,0.15)"};return{c:"var(--t3)",cr:"#8b7aa8",b:"rgba(255,255,255,0.04)"};}
function isResting(r){if(!r.restUntil)return false;var ru=pk(r.restUntil);ru.setHours(23,59,59);return td<=ru;}
function rFor(d){var w=d.getDay();return D.routines.filter(function(r){return(r.days||AD).indexOf(w)>=0&&!isResting(r);});}
function comp(k){
  var d=pk(k),dy=gdd(k),ap=rFor(d);
  var skips=dy.skips||{};
  var activeR=ap.filter(function(r){return !skips[r.id];});
  var r=activeR.filter(function(x){return dy.rc&&dy.rc[x.id];}).length;
  var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;
  var tot=activeR.length+(dy.todos||[]).length;
  return{d:r+t2,t:tot,p:tot>0?Math.round((r+t2)/tot*100):0};
}
function gSk(){var s=0,d=new Date(td);while(s<400){var c=comp(dk(d));if(c.t===0||c.p<50)break;s++;d.setDate(d.getDate()-1);}return s;}
function rSk(rid){var s=0,d=new Date(td);var rt=D.routines.find(function(r){return r.id===rid;});if(!rt)return 0;var rd=rt.days||AD;while(s<400){if(rd.indexOf(d.getDay())<0){d.setDate(d.getDate()-1);continue;}var dy=gdd(dk(d));if(dy.skips&&dy.skips[rid]){d.setDate(d.getDate()-1);continue;}if(!dy.rc||!dy.rc[rid])break;s++;d.setDate(d.getDate()-1);}return s;}
function fmtD(d){var dw=DW[L],mo=MN[L];return L==="en"?mo[d.getMonth()]+" "+d.getDate()+" ("+dw[d.getDay()]+")":(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+dw[d.getDay()]+")";}
function toast(m){var e=$("toast");e.textContent=m;e.classList.add("v");setTimeout(function(){e.classList.remove("v");},1800);}
function dLbl(days){if(!days||days.length===7)return t("daily");if(days.length===5&&[1,2,3,4,5].every(function(d){return days.indexOf(d)>=0;}))return t("weekday");if(days.length===2&&days.indexOf(0)>=0&&days.indexOf(6)>=0)return t("weekend");return days.map(function(d){return DW[L][d];}).join("·");}
function wsOf(d){var x=new Date(d),w=x.getDay();x.setDate(x.getDate()-w+(w===0?-6:1));x.setHours(0,0,0,0);return x;}
function fmtTime(sec){var m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function totalTimerMins(d){var total=0;var day=d.getDay();var dy=gdd(dk(d));var skips=dy.skips||{};D.routines.filter(function(r){return !isResting(r);}).forEach(function(r){if(r.timer&&(r.days||AD).indexOf(day)>=0&&!skips[r.id])total+=r.timer;});return total;}

// ===== Weekly Auto Report =====
function genWeekReport(weekStart){
  var ws=new Date(weekStart),stats={total:0,done:0,byR:{},best:null,worst:null,moods:[],days:0};
  for(var i=0;i<7;i++){
    var d=new Date(ws);d.setDate(d.getDate()+i);var k=dk(d),dy=gdd(k),ap=rFor(d);
    var skips=dy.skips||{};
    ap.forEach(function(r){if(skips[r.id])return;stats.total++;if(!stats.byR[r.id])stats.byR[r.id]={name:r.name,done:0,total:0};stats.byR[r.id].total++;if(dy.rc&&dy.rc[r.id]){stats.done++;stats.byR[r.id].done++;}});
    if(dy.mood)stats.moods.push(dy.mood);
    if(comp(k).t>0)stats.days++;
  }
  var avg=stats.total>0?Math.round(stats.done/stats.total*100):0;
  var bestPct=0,worstPct=100;
  Object.keys(stats.byR).forEach(function(rid){var r=stats.byR[rid];var p=r.total>0?Math.round(r.done/r.total*100):0;if(p>=bestPct){bestPct=p;stats.best={name:r.name,pct:p};}if(p<=worstPct){worstPct=p;stats.worst={name:r.name,pct:p};}});
  stats.avg=avg;return stats;
}

// ===== Weak Routines (2 weeks) =====
function getWeakRoutines(){
  var weak=[];
  D.routines.forEach(function(r){
    if(isResting(r))return;
    var missed=0,total=0;
    for(var i=0;i<14;i++){
      var d=new Date(td);d.setDate(d.getDate()-i);
      if((r.days||AD).indexOf(d.getDay())<0)continue;
      var dy=gdd(dk(d));if(dy.skips&&dy.skips[r.id])continue;
      total++;if(!dy.rc||!dy.rc[r.id])missed++;
    }
    if(total>0)weak.push({id:r.id,name:r.name,cat:r.cat||"health",missed:missed,total:total,pct:Math.round((total-missed)/total*100)});
  });
  weak.sort(function(a,b){return a.pct-b.pct;});
  return weak.slice(0,3).filter(function(w){return w.pct<80;});
}

// ===== Rest Mode =====
function setRest(rid,days){
  D.routines=D.routines.map(function(r){
    if(r.id===rid){
      if(days===0){return Object.assign({},r,{restUntil:null});}
      var end=new Date(td);end.setDate(end.getDate()+days);
      return Object.assign({},r,{restUntil:dk(end)});
    }return r;
  });save();render();toast("💤");
}

  localStorage.setItem("73r",JSON.stringify({nk:nk,fk:fk,L:L,D:D,ts:Date.now()}));
  if(!fb||!nk)return;
  var tk=dk(td),dy=gdd(tk),ap=rFor(td);

  var rd=activeR.filter(function(r){return dy.rc&&dy.rc[r.id];}).length;
  var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;
  var tot=activeR.length+(dy.todos||[]).length;
  var pct=tot>0?Math.round((rd+t2)/tot*100):0;
  fb.ref("users/"+nk).set({nk:nk,pct:pct,sk:gSk(),pts:D.pts||0,lvl:ln(gL(D.pts||0)),

    ts:Date.now()});

  fb.ref("fulldata/"+nk).set({D:D,fk:fk,L:L,ts:Date.now()});
}

// ===== FIREBASE LISTENERS =====
function loadFr(){
  if(!fb)return;
  // Self real-time sync (works without friend)
  fb.ref("fulldata/"+nk+"/ts").on("value",function(snap){
    var cloudTs=snap.val();if(!cloudTs)return;
    var localRaw=localStorage.getItem("73r");
    var localTs=0;if(localRaw){try{localTs=JSON.parse(localRaw).ts||0;}catch(e){}}
    if(cloudTs>localTs+2000){
      fb.ref("fulldata/"+nk).once("value",function(s2){
        var cloud=s2.val();if(cloud&&cloud.D){
          D=cloud.D;fk=cloud.fk||fk;L=cloud.L||L;fixD();
          localStorage.setItem("73r",JSON.stringify({nk:nk,fk:fk,L:L,D:D,ts:cloud.ts}));
          render();toast(L==="en"?"🔄 Synced!":"🔄 동기화 완료!");
        }
      });
    }
  });
  // Friend data (requires fk)
  if(!fk)return;
  fb.ref("users/"+fk).on("value",function(snap){fD=snap.val();render();});
  fb.ref("comments/"+nk).on("value",function(snap){fCmts=snap.val()||{};render();});
  fb.ref("comments/"+fk).on("value",function(snap){myCmts=snap.val()||{};render();});
  // 치지직 리스너
  cjLoadSentCount();cjListen();cjListenStreaks();cjListenLog();
}

// Level up check with themed effects
function chkLv(op,np){
  var ol=gL(op),nl=gL(np);
  if(nl.m<=ol.m)return;
  var ov=$("lvl-overlay"),bg=$("lvl-bg"),fx=$("lvl-fx"),ct=$("lvl-center");
  $("lvl-icon").textContent=nl.icon;
  $("lvl-txt").textContent=t("lvlUp")+" — "+(nl[L]||nl.en);
  $("lvl-desc").textContent=nl["desc_"+L]||nl.desc_en;
  fx.innerHTML="";
  ct.style.animation="lu .5s ease both";
  bg.style.cssText="background:rgba(15,10,30,0.95);";

  var eff=nl.eff;
  // === dim: screen darkens then brightens ===
  if(eff==="dim"){
    bg.style.cssText="background:rgba(0,0,0,0.98);animation:lvDim 3s ease both;";
  }
  // === zoom: microscope zoom-in effect ===
  if(eff==="zoom"){
    ct.style.animation="lvZoom .8s ease both";
    bg.style.cssText="background:rgba(15,10,30,0.95);";
    for(var i=0;i<12;i++){var p=document.createElement("div");p.className="lv-particle";
      p.style.cssText="width:3px;height:3px;background:#a855f7;left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;animation:lvTwinkle "+(1+Math.random()*2)+"s ease "+(Math.random()*0.5)+"s infinite";
      fx.appendChild(p);}
  }
  // === launch: rocket launch with shake ===
  if(eff==="launch"){
    bg.style.cssText="background:linear-gradient(180deg,#0a0a2e,#1a0530);";
    ct.style.animation="lvShake .5s ease, lu .5s ease both";
    var rk=document.createElement("div");rk.textContent="🚀";
    rk.style.cssText="position:absolute;bottom:10%;left:50%;font-size:60px;transform:translateX(-50%);animation:rocketLaunch 2s ease-in forwards";
    fx.appendChild(rk);
    for(var i=0;i<20;i++){var p=document.createElement("div");p.className="lv-particle";
      p.style.cssText="width:"+(2+Math.random()*4)+"px;height:"+(2+Math.random()*4)+"px;background:"+["#f59e0b","#ef4444","#ec4899"][Math.floor(Math.random()*3)]+";left:"+(40+Math.random()*20)+"%;bottom:5%;animation:lvBubble "+(0.5+Math.random()*1.5)+"s ease "+(Math.random()*0.8)+"s forwards";
      fx.appendChild(p);}
  }
  // === wake: blur to clear ===
  if(eff==="wake"){
    ct.style.animation="lvBlur 1.5s ease both";
    bg.style.cssText="background:rgba(15,10,30,0.98);";
  }
  // === arrive: stars twinkling brighter ===
  if(eff==="arrive"){
    bg.style.cssText="background:radial-gradient(ellipse at center,#1a1040,#0a0515);";
    for(var i=0;i<30;i++){var p=document.createElement("div");p.className="lv-particle";
      var sz=1+Math.random()*3;
      p.style.cssText="width:"+sz+"px;height:"+sz+"px;background:#fff;left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;animation:lvTwinkle "+(0.5+Math.random()*2)+"s ease "+(Math.random()*1)+"s infinite";
      fx.appendChild(p);}
    // Approaching object
    var ship=document.createElement("div");ship.textContent="✨";
    ship.style.cssText="position:absolute;right:10%;top:30%;font-size:24px;animation:lvFloat 2s ease infinite";
    fx.appendChild(ship);
  }
  // === music: musical notes floating ===
  if(eff==="music"){
    bg.style.cssText="background:linear-gradient(180deg,#1a0a30,#0a1530);";
    var notes=["♩","♪","♫","♬","♩","♪"];
    for(var i=0;i<notes.length;i++){var p=document.createElement("div");
      p.textContent=notes[i];
      p.style.cssText="position:absolute;font-size:"+(20+Math.random()*20)+"px;color:"+["#a855f7","#ec4899","#f59e0b","#22c55e"][Math.floor(Math.random()*4)]+";left:"+(10+Math.random()*80)+"%;bottom:20%;animation:lvNote "+(2+Math.random()*2)+"s ease "+(i*0.3)+"s forwards";
      fx.appendChild(p);}
  }
  // === glow: gentle glowing pulse ===
  if(eff==="glow"){
    bg.style.cssText="background:rgba(15,10,30,0.95);";
    ct.style.animation="lu .5s ease both, lvGlow 2s ease infinite";
    for(var i=0;i<8;i++){var p=document.createElement("div");p.className="lv-particle";
      var sz=2+Math.random()*2;
      p.style.cssText="width:"+sz+"px;height:"+sz+"px;background:#c084fc;left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;animation:lvTwinkle "+(2+Math.random()*3)+"s ease "+(Math.random())+"s infinite;opacity:0.5";
      fx.appendChild(p);}
  }
  // === bubble: bubbling/fizzing effect ===
  if(eff==="bubble"){

function spawnSat(){
  var el=document.createElement('div');
  el.className='satellite';
  var img=document.createElement('img');img.src=SAT_IMG;el.appendChild(img);
  var dir=Math.floor(Math.random()*3);
  var dur=35+Math.random()*35; // 35-70 seconds
  var startY=10+Math.random()*60;
  var curve=20+Math.random()*30;
  var sz=80+Math.random()*720; // 80-800px 랜덤
  el.style.width=sz+'px';el.style.height=sz+'px';
  if(dir===0){
    el.style.left='-30px';el.style.top=startY+'%';
    el.animate([
      {left:'-30px',top:startY+'%',opacity:0},
      {left:'30%',top:(startY-curve/2)+'%',opacity:0.7},
      {left:'60%',top:(startY-curve)+'%',opacity:0.6},
      {left:'calc(100% + 30px)',top:(startY-curve*0.8)+'%',opacity:0}
    ],{duration:dur*1000,easing:'linear'});
  } else if(dir===1){
    el.style.right='-30px';el.style.top=startY+'%';
    el.animate([
      {right:'-30px',top:startY+'%',opacity:0},
      {right:'30%',top:(startY-curve/2)+'%',opacity:0.7},
      {right:'60%',top:(startY-curve)+'%',opacity:0.6},
      {right:'calc(100% + 30px)',top:(startY-curve*0.8)+'%',opacity:0}
    ],{duration:dur*1000,easing:'linear'});
  } else {
    var startX=20+Math.random()*60;
    el.style.left=startX+'%';el.style.top='-30px';
    el.animate([
      {top:'-30px',left:startX+'%',opacity:0},
      {top:'30%',left:(startX+curve/2)+'%',opacity:0.7},
      {top:'60%',left:(startX+curve)+'%',opacity:0.6},
      {top:'calc(100% + 30px)',left:(startX+curve*0.8)+'%',opacity:0}
    ],{duration:dur*1000,easing:'linear'});
  }
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},dur*1000+500);
  // Next satellite: 40-120 seconds
  setTimeout(spawnSat,(60+Math.random()*120)*1000); // 1~3분 간격
}
