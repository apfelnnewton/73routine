function t(k){return TX[L][k]||k;}
function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function pk(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function gdd(k){return D.days[k]||{rc:{},todos:[],mood:null,journal:""};}
function gL(p){var l=LV[0];LV.forEach(function(x){if(p>=x.m)l=x;});return l;}
function nLL(p){for(var i=0;i<LV.length;i++){if(p<LV[i].m)return LV[i];}return null;}
function ln(l){return l[L];}
function tli(p){if(p>=80)return{c:"#22c55e",b:"#dcfce7"};if(p>=50)return{c:"#f59e0b",b:"#fef3c7"};if(p>0)return{c:"#ef4444",b:"#fee2e2"};return{c:"#d1d5db",b:"#f3f4f6"};}
function rFor(d){var w=d.getDay();return D.routines.filter(function(r){return(r.days||AD).indexOf(w)>=0;});}
function comp(k){var d=pk(k),dy=gdd(k),ap=rFor(d);var r=ap.filter(function(x){return dy.rc&&dy.rc[x.id];}).length;var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;var tot=ap.length+(dy.todos||[]).length;return{d:r+t2,t:tot,p:tot>0?Math.round((r+t2)/tot*100):0};}
function gSk(){var s=0,d=new Date(td);while(s<400){var c=comp(dk(d));if(c.t===0||c.p<50)break;s++;d.setDate(d.getDate()-1);}return s;}
function rSk(rid){var s=0,d=new Date(td);var rt=D.routines.find(function(r){return r.id===rid;});if(!rt)return 0;var rd=rt.days||AD;while(s<400){if(rd.indexOf(d.getDay())<0){d.setDate(d.getDate()-1);continue;}var dy=gdd(dk(d));if(!dy.rc||!dy.rc[rid])break;s++;d.setDate(d.getDate()-1);}return s;}
function fmtD(d){var dw=DW[L],mo=MN[L];return L==="en"?mo[d.getMonth()]+" "+d.getDate()+" ("+dw[d.getDay()]+")":(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+dw[d.getDay()]+")";}

function dLbl(days){if(!days||days.length===7)return t("daily");if(days.length===5&&[1,2,3,4,5].every(function(d){return days.indexOf(d)>=0;}))return t("weekday");if(days.length===2&&days.indexOf(0)>=0&&days.indexOf(6)>=0)return t("weekend");return days.map(function(d){return DW[L][d];}).join("·");}
function wsOf(d){var x=new Date(d),w=x.getDay();x.setDate(x.getDate()-w+(w===0?-6:1));x.setHours(0,0,0,0);return x;}

// ===== DEBOUNCED SAVE =====
function saveNow(){
  clearTimeout(saveTimer);
  localStorage.setItem("73r",JSON.stringify({nk:nk,fk:fk,L:L,D:D}));
  if(!fb||!nk)return;
  var tk=dk(td),dy=gdd(tk),ap=rFor(td);
  var rd=ap.filter(function(r){return dy.rc&&dy.rc[r.id];}).length;
  var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;
  var tot=ap.length+(dy.todos||[]).length;
  var pct=tot>0?Math.round((rd+t2)/tot*100):0;
  fb.ref("users/"+nk).set({nk:nk,pct:pct,sk:gSk(),pts:D.pts||0,lvl:ln(gL(D.pts||0)),
    routines:D.routines.map(function(r){return{name:r.name,cat:r.cat||"health",slot:r.slot||"morning"};}),
    todos:(dy.todos||[]).map(function(x){return{text:x.text,done:x.done};}),
    journals:Object.keys(D.days).filter(function(k){return D.days[k].journal;}).sort().reverse().slice(0,5).map(function(k){var v=D.days[k];return{date:k,text:v.journal,mood:v.mood};}),
    ts:Date.now()});
}
function save(){saveNow();}
function saveLater(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,1000);}

// ===== DRAG (PC) + MOVE BUTTONS (Mobile) =====
var dragIdx=null;
function dStart(e,i){dragIdx=i;e.target.style.opacity="0.4";}
function dOver(e){e.preventDefault();e.currentTarget.classList.add("drag-over");}
function dLeave(e){e.currentTarget.classList.remove("drag-over");}
function dDrop(e,i){e.currentTarget.classList.remove("drag-over");if(dragIdx===null||dragIdx===i){dragIdx=null;return;}var a=[].concat(D.routines);var mv=a.splice(dragIdx,1)[0];a.splice(i,0,mv);D.routines=a;dragIdx=null;save();render();}
function dEnd(e){e.target.style.opacity="1";dragIdx=null;document.querySelectorAll(".drag-over").forEach(function(el){el.classList.remove("drag-over");});}
function moveR(idx,dir){var ni=idx+dir;if(ni<0||ni>=D.routines.length)return;var a=[].concat(D.routines);var tmp=a[idx];a[idx]=a[ni];a[ni]=tmp;D.routines=a;save();render();}

  D.routines.push({id:String(Date.now()),name:nm.value.trim(),cat:cat,slot:slot,days:days});
  nm.value="";save();render();toast(t("added"));

        h+='<div draggable="true" ondragstart="dStart(event,'+idx+')" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'+idx+')" ondragend="dEnd(event)" style="display:flex;align-items:center;gap:6px;padding:10px;background:#fff;border-radius:10px;border:1px solid #f3f4f6;margin-bottom:4px">';
        h+='<div style="display:flex;flex-direction:column;gap:2px">';
        if(idx>0)h+='<button onclick="moveR('+idx+',-1)" style="background:#f3e8ff;border:none;border-radius:4px;padding:2px 6px;font-size:10px;color:#7c3aed;line-height:1">▲</button>';
        else h+='<span style="padding:2px 6px;font-size:10px;color:transparent;line-height:1">▲</span>';
        if(idx<D.routines.length-1)h+='<button onclick="moveR('+idx+',1)" style="background:#f3e8ff;border:none;border-radius:4px;padding:2px 6px;font-size:10px;color:#7c3aed;line-height:1">▼</button>';
        else h+='<span style="padding:2px 6px;font-size:10px;color:transparent;line-height:1">▼</span>';
        h+='</div>';
        h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">';
        h+='<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:'+cat.c+'15;color:'+cat.c+';font-weight:700">'+cat.icon+t(cat.id)+'</span>';
        h+='<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:'+sl.c+'15;color:'+sl.c+';font-weight:700">'+sl.icon+t(sl.id)+'</span></div>';
        h+='<span style="font-size:13px;color:#374151;font-weight:500">'+esc(r.name)+'</span>';
        h+='<div style="font-size:10px;color:#a78bfa;margin-top:1px">'+dLbl(r.days)+'</div></div>';
        if(rs>0)h+='<span style="font-size:10px;color:#7c3aed;font-weight:700">🔥'+rs+'</span>';
        h+='<button class="bs" onclick="startEdit(\''+r.id+'\')">✏️</button>';
        h+='<button class="bs" onclick="rmR(\''+r.id+'\')" style="color:#ef4444">🗑</button></div>';}
    });
    h+='</div></div>';
  }

  // ======= SOCIAL =======
  if(curT==="social"){
    h+='<div class="fi">';
    if(mCh.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:6px">💌 '+t("cheerFor")+'</p><div style="display:flex;flex-wrap:wrap;gap:4px">';
      mCh.slice(-10).reverse().forEach(function(c){h+='<span style="padding:4px 8px;border-radius:8px;background:#fce7f3;font-size:12px">'+c.em+' <span style="font-size:10px;color:#9ca3af">'+esc(c.from)+'</span></span>';});h+='</div></div>';}
    if(!fD){h+='<div class="card" style="text-align:center;padding:24px"><span style="font-size:40px">👥</span><p style="color:#9ca3af;font-size:13px;margin-top:8px">'+t("noFr")+'</p><button class="bs" onclick="chgFr()" style="margin-top:8px;padding:6px 16px">'+t("connect")+'</button></div>';}
    else{
      var ftl=tli(fD.pct);
      h+='<div class="card" style="background:linear-gradient(135deg,#fef3c7,#fce7f3)">';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
      h+='<div><p style="font-size:16px;font-weight:800;color:#374151">'+esc(fD.nk)+'</p><p style="font-size:11px;color:#9ca3af">'+(fD.lvl||"")+'</p></div>';
      h+='<div style="display:flex;align-items:center;gap:8px"><div style="width:48px;height:48px;border-radius:50%;background:'+ftl.b+';display:flex;align-items:center;justify-content:center;border:3px solid '+ftl.c+'"><span style="font-size:16px;font-weight:900;color:'+ftl.c+'">'+fD.pct+'%</span></div>';
      if(fD.sk>0)h+='<div style="text-align:center">🔥<p style="font-size:14px;font-weight:800;color:#d97706">'+fD.sk+'</p></div>';
      h+='</div></div><p style="font-size:11px;color:#9ca3af;margin-bottom:4px">'+t("sendCh")+'</p><div style="display:flex;gap:4px">';
      CH.forEach(function(c){h+='<button onclick="sendCh(\''+c+'\')" style="font-size:20px;padding:4px 8px;border-radius:8px;background:#fff;border:1px solid #e5e7eb">'+c+'</button>';});
      h+='</div></div>';
      h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:8px">⚡ '+t("comp")+'</p><div style="display:flex;gap:8px"><div style="flex:1;text-align:center;padding:10px;border-radius:10px;background:#f3e8ff"><p style="font-size:10px;color:#7c3aed;font-weight:600">'+esc(nk)+'</p><p style="font-size:22px;font-weight:900;color:#7c3aed">'+comp(dk(td)).p+'%</p><p style="font-size:10px;color:#a78bfa">🔥'+gSk()+t("dS")+'</p></div><div style="display:flex;align-items:center;font-size:18px">⚡</div><div style="flex:1;text-align:center;padding:10px;border-radius:10px;background:#fef3c7"><p style="font-size:10px;color:#d97706;font-weight:600">'+esc(fD.nk)+'</p><p style="font-size:22px;font-weight:900;color:#d97706">'+fD.pct+'%</p><p style="font-size:10px;color:#f59e0b">🔥'+fD.sk+t("dS")+'</p></div></div></div>';
      if(fD.routines&&fD.routines.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:6px">📋 '+esc(fD.nk)+' '+t("fR")+'</p>';
        fD.routines.forEach(function(r){var cat=CA.find(function(c){return c.id===r.cat;})||CA[0];h+='<div style="display:flex;align-items:center;gap:4px;padding:4px 7px;background:#faf5ff;border-radius:6px;margin-bottom:2px"><span style="font-size:8px;padding:1px 3px;border-radius:3px;background:'+cat.c+'15;color:'+cat.c+';font-weight:700">'+cat.icon+'</span><span style="font-size:11px;color:#374151">'+esc(r.name)+'</span></div>';});h+='</div>';}
      if(fD.todos&&fD.todos.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:6px">📝 '+esc(fD.nk)+' '+t("fT")+'</p>';
        fD.todos.forEach(function(x){h+='<div style="display:flex;align-items:center;gap:6px;padding:4px 7px;background:'+(x.done?"#f3e8ff":"#f9fafb")+';border-radius:6px;margin-bottom:2px"><span style="width:14px;height:14px;border-radius:4px;'+(x.done?"background:#a855f7;":"border:2px solid #d1d5db;")+'display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#fff">'+(x.done?"✓":"")+'</span><span style="font-size:11px;color:'+(x.done?"#a78bfa":"#374151")+';text-decoration:'+(x.done?"line-through":"none")+'">'+esc(x.text)+'</span></div>';});h+='</div>';}
      if(fD.journals&&fD.journals.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:6px">✍️ '+esc(fD.nk)+' '+t("fN")+'</p>';
        fD.journals.forEach(function(j,ji){var cid="fc-"+ji;h+='<div style="padding:8px 10px;background:#faf5ff;border-radius:8px;border-left:3px solid #a855f7;margin-bottom:6px"><p style="font-size:10px;color:#a78bfa;font-weight:600">'+fmtD(pk(j.date))+' '+(j.mood||"")+'</p><p style="font-size:12px;color:#4b5563;margin-top:2px;line-height:1.5">'+esc(j.text)+'</p><div style="display:flex;gap:4px;margin-top:6px"><input class="inp" style="font-size:11px" placeholder="'+t("cmtPH")+'" id="'+cid+'"><button class="bs" onclick="sendCmt(\''+j.date+'\',\''+cid+'\')" style="background:#7c3aed;color:#fff">'+t("send")+'</button></div></div>';});h+='</div>';}}
    h+='</div>';
  }

  // ======= STATS =======
  if(curT==="stats"){
    h+='<div class="fi">';
    var lv2=gL(D.pts||0),nl2=nLL(D.pts||0);
    h+='<div class="card" style="text-align:center;background:linear-gradient(135deg,#f3e8ff,#fce7f3)"><div style="font-size:48px">'+ln(lv2).split(" ")[0]+'</div><h3 style="font-size:18px;font-weight:900;color:#7c3aed">'+ln(lv2)+'</h3><p style="font-size:11px;color:#c4b5d4;margin-top:6px">'+t("tPts").replace("{n}",D.pts||0)+'</p>';
    if(nl2)h+='<p style="font-size:10px;color:#d1d5db;margin-top:2px">'+t("nLvl").replace("{n}",nl2.m-(D.pts||0))+'</p>';
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
    h+='<div class="card" style="text-align:center"><span style="font-size:28px">🔥</span><p style="font-size:24px;font-weight:900;color:#7c3aed">'+gSk()+'</p><p style="font-size:10px;color:#9ca3af">'+t("streak")+'</p></div>';
    h+='<div class="card" style="text-align:center"><span style="font-size:28px">📅</span><p style="font-size:24px;font-weight:900;color:#ec4899">'+Object.keys(D.days).filter(function(k){return comp(k).p>=50;}).length+'</p><p style="font-size:10px;color:#9ca3af">'+t("tDays")+'</p></div></div>';
    h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:8px">📊 '+t("last7")+'</p><div style="display:flex;align-items:flex-end;justify-content:center;gap:6px;height:110px;padding:6px 0">';
    for(var i2=0;i2<7;i2++){var d2=new Date(td);d2.setDate(d2.getDate()-6+i2);var p2=comp(dk(d2)).p,tl4=tli(p2);
      h+='<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1"><span style="font-size:8px;font-weight:700;color:'+tl4.c+'">'+(p2>0?p2+"%":"")+'</span><div style="width:100%;max-width:26px;height:'+Math.max(4,p2)+'%;border-radius:5px;background:'+(p2>0?tl4.c:"#f3f4f6")+';transition:height .4s"></div><span style="font-size:9px;color:'+(dk(d2)===dk(td)?"#7c3aed":"#9ca3af")+';font-weight:'+(dk(d2)===dk(td)?700:400)+'">'+DW[L][d2.getDay()]+'</span></div>';}
    h+='</div></div>';
    if(D.routines.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:8px">🔥 '+t("rStr")+'</p>';
      D.routines.forEach(function(r){var rs=rSk(r.id),cat=CA.find(function(c){return c.id===(r.cat||"health");})||CA[0];
        h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:9px;padding:1px 5px;border-radius:4px;background:'+cat.c+'15;color:'+cat.c+';font-weight:700">'+cat.icon+t(cat.id)+'</span><span style="font-size:12px;color:#4b5563;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.name)+'</span><span style="font-size:13px;font-weight:800;color:'+(rs>0?"#7c3aed":"#d1d5db")+'">'+(rs>0?"🔥"+rs+t("dS"):"—")+'</span></div>';});
      h+='</div>';}
    var jnls=Object.keys(D.days).filter(function(k){return D.days[k].journal;}).sort().reverse().slice(0,5);
    if(jnls.length){h+='<div class="card"><p style="font-size:12px;font-weight:700;color:#4b5563;margin-bottom:8px">✍️ '+t("rNotes")+'</p>';
      jnls.forEach(function(k){var v=D.days[k];h+='<div style="padding:8px 10px;background:#faf5ff;border-radius:8px;border-left:3px solid #a855f7;margin-bottom:6px"><p style="font-size:10px;color:#a78bfa;font-weight:600">'+fmtD(pk(k))+' '+(v.mood||"")+'</p><p style="font-size:12px;color:#4b5563;margin-top:2px;line-height:1.5">'+esc(v.journal)+'</p></div>';});
      h+='</div>';}
    h+='</div>';
  }
  ct.innerHTML=h;
}

load();
</script>
</body>
</html>
