<style>
:root{
--bg:#0f0a1e;--bg2:#1a1230;--card:rgba(255,255,255,0.03);--card-b:1px solid rgba(255,255,255,0.06);
--glass:rgba(255,255,255,0.04);--glass-b:1px solid rgba(255,255,255,0.08);
--t1:#f0e6ff;--t2:#c4b5d4;--t3:#8b7aa8;
--acc:#a855f7;--acc2:#7c3aed;--acc3:#c084fc;
--pink:#ec4899;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#6366f1;
--font:'Noto Sans KR','Orbitron',sans-serif;--font-d:'Orbitron','Noto Sans KR',sans-serif;
--stars-display:block;
}
.light{
--bg:#dce8d0;--bg2:#d0dfca;--card:rgba(255,255,255,0.55);--card-b:1px solid rgba(200,100,20,0.15);
--glass:rgba(255,255,255,0.5);--glass-b:1px solid rgba(200,100,20,0.18);
--t1:#1a1210;--t2:#5b3a2b;--t3:#8b6a58;
--acc:#d45e0a;--acc2:#c43d08;--acc3:#e8780f;
--pink:#db2777;--green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#4f46e5;
--stars-display:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);overscroll-behavior:none;-webkit-overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--t1);margin:0 auto;padding:0 16px 90px;min-height:100vh;
-webkit-tap-highlight-color:transparent;position:relative;overflow-x:hidden;overscroll-behavior:none;
max-width:480px;transition:background .3s,color .3s}
@media(min-width:768px){body{max-width:720px;padding:0 24px 90px}}
@media(min-width:1024px){body{max-width:900px;padding:0 32px 90px}}

/* Stars BG */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;display:var(--stars-display)}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
.star.bright{box-shadow:0 0 4px 1px rgba(200,210,255,0.5)}
.star.warm{background:#ffeedd;box-shadow:0 0 4px 1px rgba(255,200,150,0.4)}
.star.blue{background:#cce0ff;box-shadow:0 0 4px 1px rgba(180,200,255,0.5)}
@keyframes twinkle{0%{opacity:0.1;transform:scale(0.8)}100%{opacity:var(--op);transform:scale(1.2)}}
/* Aurora gradient blobs - gives blur something to work with */
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(90px);animation:auroraFloat 12s ease-in-out infinite alternate}
.aurora-blob:nth-child(1){width:400px;height:400px;background:radial-gradient(circle,rgba(30,64,175,0.7),transparent 70%);top:5%;left:-20%;opacity:0.55;animation-duration:14s}
.aurora-blob:nth-child(2){width:350px;height:350px;background:radial-gradient(circle,rgba(14,116,144,0.6),transparent 70%);bottom:15%;right:-15%;opacity:0.45;animation-duration:18s;animation-delay:-4s}
.aurora-blob:nth-child(3){width:300px;height:300px;background:radial-gradient(circle,rgba(245,158,11,0.35),transparent 70%);top:35%;left:30%;opacity:0.35;animation-duration:16s;animation-delay:-8s}
.aurora-blob:nth-child(4){width:280px;height:280px;background:radial-gradient(circle,rgba(124,58,237,0.5),transparent 70%);top:60%;left:10%;opacity:0.4;animation-duration:20s;animation-delay:-12s}
@keyframes auroraFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.15)}100%{transform:translate(-20px,30px) scale(0.9)}}
.light .aurora-blob:nth-child(1){background:radial-gradient(circle,rgba(10,100,40,0.8),transparent 70%);opacity:0.65;width:500px;height:500px;animation:adrianSwirl1 20s ease-in-out infinite alternate}
.light .aurora-blob:nth-child(2){background:radial-gradient(circle,rgba(185,80,10,0.7),transparent 70%);opacity:0.6;width:450px;height:450px;animation:adrianSwirl2 25s ease-in-out infinite alternate}
.light .aurora-blob:nth-child(3){background:radial-gradient(circle,rgba(40,150,60,0.65),transparent 70%);opacity:0.55;width:380px;height:380px;animation:adrianSwirl3 18s ease-in-out infinite alternate}
.light .aurora-blob:nth-child(4){background:radial-gradient(circle,rgba(160,110,5,0.65),transparent 70%);opacity:0.5;width:420px;height:420px;animation:adrianSwirl4 22s ease-in-out infinite alternate}
@keyframes adrianSwirl1{0%{transform:translate(0,0) scale(1) rotate(0deg)}33%{transform:translate(40px,-30px) scale(1.2) rotate(15deg)}66%{transform:translate(-20px,40px) scale(0.9) rotate(-10deg)}100%{transform:translate(30px,20px) scale(1.1) rotate(8deg)}}
@keyframes adrianSwirl2{0%{transform:translate(0,0) scale(1) rotate(0deg)}33%{transform:translate(-35px,25px) scale(1.15) rotate(-12deg)}66%{transform:translate(25px,-35px) scale(0.95) rotate(18deg)}100%{transform:translate(-15px,-20px) scale(1.1) rotate(-5deg)}}
@keyframes adrianSwirl3{0%{transform:translate(0,0) scale(1) rotate(0deg)}50%{transform:translate(30px,30px) scale(1.2) rotate(20deg)}100%{transform:translate(-25px,-15px) scale(0.85) rotate(-15deg)}}
@keyframes adrianSwirl4{0%{transform:translate(0,0) scale(1) rotate(0deg)}50%{transform:translate(-40px,20px) scale(1.15) rotate(-20deg)}100%{transform:translate(20px,-30px) scale(0.9) rotate(12deg)}}

button{cursor:pointer;font-family:inherit}input,textarea,select{font-family:inherit}
/* Satellite flyby */
.satellite{position:fixed;z-index:0;pointer-events:none;opacity:1}
.satellite img{width:100%;height:100%;object-fit:contain}
.light .satellite{display:none}

input:focus,textarea:focus,select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(168,85,247,0.15)}
.card{background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,rgba(255,255,255,0.01) 50%,rgba(255,255,255,0.02) 100%);backdrop-filter:blur(9px) saturate(150%);-webkit-backdrop-filter:blur(9px) saturate(150%);border:var(--card-b);border-top:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px;margin-bottom:8px;position:relative;z-index:1;box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);-webkit-transform:translateZ(0);transform:translateZ(0);will-change:backdrop-filter}
.btn{padding:10px 18px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:transform .15s,box-shadow .15s}
.btn:active{transform:scale(0.95)}
.bs{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:5px 10px;font-size:13px;color:var(--acc3);white-space:nowrap;flex-shrink:0;backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
.inp{padding:10px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:8px;font-size:14px;background:rgba(255,255,255,0.03);color:var(--t1);width:100%;backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
.sel{padding:10px;border:1px solid rgba(255,255,255,0.06);border-radius:8px;font-size:13px;background:rgba(255,255,255,0.03);color:var(--t1);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
.sel option{background:var(--bg2);color:var(--t1)}
.ta{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:8px;font-size:14px;background:rgba(255,255,255,0.02);color:var(--t1);resize:none;line-height:1.6}
.nb{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:5px 12px;font-size:13px;color:var(--acc3);font-weight:600;backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}

/* Tabs */

/* Undo toast */
.undo-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(30,20,50,0.7);backdrop-filter:blur(12px) saturate(150%);-webkit-backdrop-filter:blur(12px) saturate(150%);border:1px solid rgba(255,255,255,0.18);color:var(--t1);padding:8px 16px;border-radius:12px;font-size:14px;z-index:9998;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.3)}

function t(k){return TX[L][k]||k;}
function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function pk(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function gdd(k){if(!D.days)D.days={};return D.days[k]||{rc:{},todos:[],mood:null,journal:"",skips:{}};}
function gL(p){var l=LV[0];LV.forEach(function(x){if(p>=x.m)l=x;});return l;}
function nLL(p){for(var i=0;i<LV.length;i++){if(p<LV[i].m)return LV[i];}return null;}
function ln(l){return l.icon+" "+(l[L]||l.en);}
function tli(p){if(p>=80)return{c:"var(--green)",cr:"#22c55e",b:"rgba(34,197,94,0.15)"};if(p>=50)return{c:"var(--amber)",cr:"#f59e0b",b:"rgba(245,158,11,0.15)"};if(p>0)return{c:"var(--red)",cr:"#ef4444",b:"rgba(239,68,68,0.15)"};return{c:"var(--t3)",cr:"#8b7aa8",b:"rgba(255,255,255,0.04)"};}
function isResting(r){if(!r.restUntil)return false;var ru=pk(r.restUntil);ru.setHours(23,59,59);return td<=ru;}
function rFor(d){var w=d.getDay();return D.routines.filter(function(r){return(r.days||AD).indexOf(w)>=0&&!isResting(r);});}
function comp(k){
  var d=pk(k),dy=gdd(k),ap=rFor(d);
  var skips=dy.skips||{};
  var r=ap.filter(function(x){return !skips[x.id]&&dy.rc&&dy.rc[x.id];}).length;
  var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;
  var tot=ap.length+(dy.todos||[]).length;
  return{d:r+t2,t:tot,p:tot>0?Math.round((r+t2)/tot*100):0};
}
function gSk(){var s=0,d=new Date(td);var empty=0;while(s<400){var c=comp(dk(d));if(c.t===0){empty++;if(empty>14)break;d.setDate(d.getDate()-1);continue;}empty=0;if(c.p<50)break;s++;d.setDate(d.getDate()-1);}return s;}
function rSk(rid){var s=0,d=new Date(td);var rt=D.routines.find(function(r){return r.id===rid;});if(!rt)return 0;var rd=rt.days||AD;while(s<400){if(rd.indexOf(d.getDay())<0){d.setDate(d.getDate()-1);continue;}var dy=gdd(dk(d));if(dy.skips&&dy.skips[rid]){d.setDate(d.getDate()-1);continue;}if(!dy.rc||!dy.rc[rid])break;s++;d.setDate(d.getDate()-1);}return s;}
function fmtD(d){var dw=DW[L],mo=MN[L];return L==="en"?mo[d.getMonth()]+" "+d.getDate()+" ("+dw[d.getDay()]+")":(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+dw[d.getDay()]+")";}
function toast(m){var e=$("toast");e.textContent=m;e.classList.add("v");setTimeout(function(){e.classList.remove("v");},1800);}
function dLbl(days){if(!days||days.length===7)return t("daily");if(days.length===5&&[1,2,3,4,5].every(function(d){return days.indexOf(d)>=0;}))return t("weekday");if(days.length===2&&days.indexOf(0)>=0&&days.indexOf(6)>=0)return t("weekend");return days.map(function(d){return DW[L][d];}).join("·");}
function wsOf(d){var x=new Date(d),w=x.getDay();x.setDate(x.getDate()-w+(w===0?-6:1));x.setHours(0,0,0,0);return x;}
function fmtTime(sec){var m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function totalTimerMins(d){var total=0;var day=d.getDay();var dy=gdd(dk(d));var skips=dy.skips||{};D.routines.filter(function(r){return !isResting(r);}).forEach(function(r){if(r.timer&&(r.days||AD).indexOf(day)>=0&&!skips[r.id])total+=r.timer;});return total;}

// ===== Weekly Auto Report =====
function genWeekReport(weekStart){
  var ws=new Date(weekStart),stats={total:0,done:0,byR:{},best:null,worst:null,moods:[],days:0};
  for(var i=0;i<7;i++){
    var d=new Date(ws);d.setDate(d.getDate()+i);var k=dk(d),dy=gdd(k),ap=rFor(d);
    var skips=dy.skips||{};
    ap.forEach(function(r){if(skips[r.id])return;stats.total++;if(!stats.byR[r.id])stats.byR[r.id]={name:r.name,done:0,total:0};stats.byR[r.id].total++;if(dy.rc&&dy.rc[r.id]){stats.done++;stats.byR[r.id].done++;}});
    if(dy.mood)stats.moods.push(dy.mood);
    if(comp(k).t>0)stats.days++;
  }
  var avg=stats.total>0?Math.round(stats.done/stats.total*100):0;
  var bestPct=0,worstPct=100;
  Object.keys(stats.byR).forEach(function(rid){var r=stats.byR[rid];var p=r.total>0?Math.round(r.done/r.total*100):0;if(p>=bestPct){bestPct=p;stats.best={name:r.name,pct:p};}if(p<=worstPct){worstPct=p;stats.worst={name:r.name,pct:p};}});
  stats.avg=avg;return stats;
}

// ===== Unfinished Todos (weekly) =====
function getUnfinishedTodos(weekStart){
  var ws=new Date(weekStart),result=[];
  for(var i=0;i<7;i++){
    var d=new Date(ws);d.setDate(d.getDate()+i);var k=dk(d),dy=gdd(k);
    if(!dy.todos||!dy.todos.length)continue;
    dy.todos.forEach(function(todo){
      if(!todo.done){var sp2=subProgress(todo);result.push({dateKey:k,date:fmtD(d),id:todo.id,text:todo.text,sub:sp2});}
    });
  }
  return result;
}

// ===== Weak Routines (2 weeks) =====
function getWeakRoutines(){
  var weak=[];
  D.routines.forEach(function(r){
    if(isResting(r))return;
    var missed=0,total=0;
    for(var i=0;i<14;i++){
      var d=new Date(td);d.setDate(d.getDate()-i);
      if((r.days||AD).indexOf(d.getDay())<0)continue;
      var dy=gdd(dk(d));if(dy.skips&&dy.skips[r.id])continue;
      total++;if(!dy.rc||!dy.rc[r.id])missed++;
    }
    if(total>0)weak.push({id:r.id,name:r.name,cat:r.cat||"health",missed:missed,total:total,pct:Math.round((total-missed)/total*100)});
  });
  weak.sort(function(a,b){return a.pct-b.pct;});
  return weak.slice(0,3).filter(function(w){return w.pct<80;});
}

function setRest(rid,days){
  D.routines=D.routines.map(function(r){
    if(r.id===rid){
      if(days===0){return Object.assign({},r,{restUntil:null});}
      var end=new Date(td);end.setDate(end.getDate()+days);
      return Object.assign({},r,{restUntil:dk(end)});
    }return r;
  });save();render();toast("💤");
}

// ===== 데이터 병합 (다른 기기에서 변경된 데이터를 안전하게 합침) =====
function mergeData(cloudD){
  if(!cloudD)return;
  // 루틴 목록: 클라우드 기준 (구조 변경은 마지막 수정 기기가 맞음)
  D.routines=cloudD.routines||D.routines;
  // 점수: 더 높은 쪽 유지 (점수가 줄어드는 일 방지)
  D.pts=Math.max(D.pts||0,cloudD.pts||0);
  // 리뷰: 양쪽 합침
  if(cloudD.reviews){if(!D.reviews)D.reviews={};Object.keys(cloudD.reviews).forEach(function(k){if(!D.reviews[k]||cloudD.reviews[k])D.reviews[k]=cloudD.reviews[k];});}
  // 날짜별 기록: 핵심 병합 (루틴 체크, 투두, 일기, 기분 모두 합침)
  var cDays=cloudD.days||{};
  Object.keys(cDays).forEach(function(k){
    if(!D.days[k]){D.days[k]=cDays[k];return;}
    var local=D.days[k],cloud=cDays[k];
    // 루틴 체크: 어느 쪽이든 체크했으면 체크 유지
    if(cloud.rc){if(!local.rc)local.rc={};Object.keys(cloud.rc).forEach(function(rid){if(cloud.rc[rid])local.rc[rid]=true;});}
    // 투두: ID 기준으로 합침 (중복 제거)
    if(cloud.todos&&cloud.todos.length){
      if(!local.todos)local.todos=[];
      var ids={};local.todos.forEach(function(t){ids[t.id]=true;});
      cloud.todos.forEach(function(t){
        if(!ids[t.id])local.todos.push(t);
        else{var lt=local.todos.find(function(x){return x.id===t.id;});if(lt){if(t.done&&!lt.done)lt.done=true;if(t.subs&&t.subs.length&&(!lt.subs||!lt.subs.length))lt.subs=t.subs;else if(t.subs&&lt.subs){t.subs.forEach(function(cs){var ls=lt.subs.find(function(s){return s.id===cs.id;});if(!ls)lt.subs.push(cs);else if(cs.done&&!ls.done)ls.done=true;});}}}
      });
    }
    // 기분: 값이 있는 쪽 우선
    if(cloud.mood&&!local.mood)local.mood=cloud.mood;
    // 일기: 더 긴 쪽 유지 (수정한 쪽이 보통 더 김)
    if(cloud.journal&&(!local.journal||cloud.journal.length>local.journal.length))local.journal=cloud.journal;
    // 스킵: 양쪽 합침
    if(cloud.skips){if(!local.skips)local.skips={};Object.keys(cloud.skips).forEach(function(rid){if(cloud.skips[rid])local.skips[rid]=true;});}
  });
}

// ===== 1년 넘은 오래된 날짜 기록 자동 정리 (점수/레벨/루틴은 유지) =====
function cleanOldDays(){
  if(!D||!D.days)return;
  var cutoff=new Date();cutoff.setFullYear(cutoff.getFullYear()-1);
  var cutKey=dk(cutoff);
  var keys=Object.keys(D.days);
  var removed=0;
  keys.forEach(function(k){if(k<cutKey){delete D.days[k];removed++;}});
  if(removed>0)console.log("cleanOldDays: "+removed+"개 오래된 기록 정리됨");
}

// ===== DEBOUNCED SAVE =====
function saveNow(){
  cleanOldDays();
  clearTimeout(saveTimer);
  try{localStorage.setItem("73r",JSON.stringify({nk:nk,nkEn:nkEn,fks:fks,L:L,D:D,ts:Date.now()}));}
  catch(e){toast(L==="en"?"⚠️ Storage full! Export backup.":"⚠️ 저장 공간 부족! 백업을 내보내세요.");}
  if(!fb||!nk)return;
  var tk=dk(td),dy=gdd(tk),ap=rFor(td);
  var skips=dy.skips||{};
  var activeR=ap.filter(function(r){return !skips[r.id];});
  var rd=activeR.filter(function(r){return dy.rc&&dy.rc[r.id];}).length;
  var t2=(dy.todos||[]).filter(function(x){return x.done;}).length;
  var tot=activeR.length+(dy.todos||[]).length;
  var pct=tot>0?Math.round((rd+t2)/tot*100):0;
  fb.ref("users/"+nk).set({nk:nk,nkEn:nkEn||nk,pct:pct,sk:gSk(),pts:D.pts||0,lvl:ln(gL(D.pts||0)),
    routines:D.routines.map(function(r){return{name:r.name,cat:r.cat||"health",slot:r.slot||"morning",restUntil:r.restUntil||null};}),
    todos:(dy.todos||[]).map(function(x){var r={text:x.text,done:x.done};if(x.subs&&x.subs.length){r.subsTotal=x.subs.length;r.subsDone=x.subs.filter(function(s){return s.done;}).length;}return r;}),
    journals:Object.keys(D.days).filter(function(k){return D.days[k].journal;}).sort().reverse().slice(0,5).map(function(k){var v=D.days[k];return{date:k,text:v.journal,mood:v.mood};}),
    ts:Date.now()});
  // Full data sync
  fb.ref("fulldata/"+nk).set({D:D,fks:fks,nkEn:nkEn,L:L,ts:Date.now()});
}
function save(){saveNow();}
function saveLater(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,1000);}

function sendCj(){
  var afk=activeFk();if(!fb||!afk||!nk)return;if(_cjSent>=3){toast(L==="en"?"No more signals today 📡":"오늘 치지직을 다 썼어요 📡");return;}

  fb.ref('chijik/'+afk).push({from:nk,ts:Date.now(),msgIdx:idx,read:false});
  fb.ref('chijikCount/'+nk+'/'+afk+'/'+dk(new Date())).transaction(function(v){return(v||0)+1;});

  var today=dk(new Date());

var _cjListening=false;
function cjListen(){
  if(!fb||!nk||_cjListening)return;_cjListening=true;
  var _cjRef=fb.ref('chijik/'+nk);_fbRefs.push(_cjRef);
  _cjRef.on('value',function(snap){
    var data=snap.val();if(!data)return;
    var unread=[];
    Object.entries(data).forEach(function(e){if(!e[1].read)unread.push({key:e[0],from:e[1].from,ts:e[1].ts,msgIdx:e[1].msgIdx||0});});
    if(!unread.length)return;
    var updates={};unread.forEach(function(u){updates['chijik/'+nk+'/'+u.key+'/read']=true;});
    fb.ref().update(updates);cjUpdateStreak();cjReceive(unread);render();
  });
}
function cjUpdateStreak(){
  if(!fb||!nk)return;var today=dk(new Date());
  // 보낸 사람 기준으로 스트릭 업데이트 (from → 나에게 보낸 친구)
  // 수신 시 호출되므로, 각 친구별 스트릭을 업데이트
  fks.forEach(function(fk){
    fb.ref('chijikStreak/'+nk+'/'+fk).once('value',function(snap){
      var s=snap.val()||{count:0,lastDate:''};var yest=dk(new Date(Date.now()-86400000));
      if(s.lastDate===today)return;
      // 오늘 이 친구에게서 받은 게 있는지 확인
      fb.ref('chijik/'+nk).orderByChild('from').equalTo(fk).limitToLast(1).once('value',function(csnap){
        var hasToday=false;
        if(csnap.val())Object.values(csnap.val()).forEach(function(v){if(dk(new Date(v.ts))===today)hasToday=true;});
        if(hasToday)fb.ref('chijikStreak/'+nk+'/'+fk).set({count:s.lastDate===yest?(s.count||0)+1:1,lastDate:today});
      });
    });
  });
}

    var b=new Blob([JSON.stringify({nk:nk,nkEn:nkEn,fks:fks,L:L,D:D},null,2)],{type:"application/json"});
    var u=URL.createObjectURL(b);

function _startTimerInternal(rid,startTs,dur){
  var r=D.routines.find(function(x){return x.id===rid;});if(!r)return;
  var remaining=dur-Math.floor((Date.now()-startTs)/1000);
  if(remaining<=0)return;
  activeTimers[rid]={start:startTs,dur:dur,remaining:remaining};
  activeTimers[rid].interval=setInterval(function(){
    var at=activeTimers[rid];if(!at)return;
    at.remaining=at.dur-Math.floor((Date.now()-at.start)/1000);
    if(at.remaining<=0){clearInterval(at.interval);delete activeTimers[rid];saveTimers();toast("⏰ "+r.name+" "+t("timerDone"));
      if(navigator.vibrate)navigator.vibrate([200,100,200]);render();return;}
    var el=$("tm-"+rid);if(el)el.textContent=fmtTime(at.remaining);
    var svg=document.querySelector("#tmr-"+rid+" circle.prog");
    if(svg){var pct=at.remaining/at.dur;svg.style.strokeDashoffset=88-(88*pct);}
  },1000);
}
function startTimer(rid){
  var r=D.routines.find(function(x){return x.id===rid;});if(!r||!r.timer)return;
  if(activeTimers[rid]){clearInterval(activeTimers[rid].interval);delete activeTimers[rid];saveTimers();render();return;}
  var dur=r.timer*60;

}

function chkLv(op,np){
  var ol=gL(op),nl=gL(np);
  if(nl.m<=ol.m)return;
  var ov=$("lvl-overlay"),bg=$("lvl-bg"),fx=$("lvl-fx"),ct=$("lvl-center");

  fx.innerHTML="";

        h+='<div style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;opacity:0.35">';
        h+='<span style="font-size:26px">🔒</span>';
        h+='<span style="font-size:10px;color:var(--t3);font-weight:700;text-align:center;line-height:1.2">'+lv.m+' pt</span>';
        h+='</div>';
      }
    });
    h+='</div></div>';

    // Weak Routines Insight
    var weak=getWeakRoutines();
    if(weak.length){
      h+='<div class="insight-card"><p style="font-size:10px;font-weight:800;color:var(--red);margin-bottom:4px">⚠️ '+t("weakTitle")+'</p>';
      h+='<p style="font-size:10px;color:var(--t3);margin-bottom:8px">'+t("weakDesc")+'</p>';
      weak.forEach(function(w){
        var cat=CA.find(function(c){return c.id===w.cat;})||CA[0];
        h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:4px">';
        h+='<span style="font-size:10px;padding:1px 5px;border-radius:4px;background:'+cat.c+'20;color:'+cat.c+';font-weight:700">'+cat.icon+'</span>';
        h+='<span style="flex:1;font-size:10px;color:var(--t1)">'+esc(w.name)+'</span>';
        h+='<span style="font-size:10px;font-weight:700;color:var(--red)">'+w.pct+'%</span>';
        h+='<span style="font-size:10px;color:var(--t3)">('+w.missed+'/'+w.total+' '+(L==="en"?"missed":"놓침")+')</span>';
        h+='</div>';
      });
      h+='</div>';
    }

    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
    h+='<div class="card" style="text-align:center"><span style="font-size:30px">🔥</span><p style="font-size:26px;font-weight:900;color:var(--acc);font-family:var(--font-d)">'+gSk()+'</p><p style="font-size:10px;color:var(--t3)">'+t("streak")+'</p></div>';
    h+='<div class="card" style="text-align:center"><span style="font-size:30px">📅</span><p style="font-size:26px;font-weight:900;color:var(--pink);font-family:var(--font-d)">'+Object.keys(D.days).filter(function(k){return comp(k).p>=50;}).length+'</p><p style="font-size:10px;color:var(--t3)">'+t("tDays")+'</p></div></div>';
    // === 최근 7일 꺾은선 그래프 (옵션 A) ===
    h+='<div class="card"><p style="font-size:10px;font-weight:700;color:var(--t2);margin-bottom:8px">📊 '+t("last7")+'</p>';
    var _7d=[],_7l=[];
    for(var i2=0;i2<7;i2++){var d2=new Date(td);d2.setDate(d2.getDate()-6+i2);var p2=comp(dk(d2)).p;_7d.push({p:p2,tl:tli(p2),dow:DW[L][d2.getDay()],isToday:dk(d2)===dk(td)});}
    var svgW=320,svgH=100,padL=10,padR=10,padT=18,padB=4;
    var cW=svgW-padL-padR,cH=svgH-padT-padB;
    var pts=[];for(var j=0;j<7;j++){var px2=padL+j*(cW/6);var py2=padT+cH-((_7d[j].p/100)*cH);pts.push({x:px2,y:py2});}
    // area fill path
    var areaPath='M'+pts[0].x+','+pts[0].y;for(var j=1;j<7;j++)areaPath+=' L'+pts[j].x+','+pts[j].y;
    areaPath+=' L'+pts[6].x+','+(padT+cH)+' L'+pts[0].x+','+(padT+cH)+' Z';
    // line path
    var linePts=pts.map(function(p){return p.x+','+p.y;}).join(' ');
    h+='<div style="position:relative;margin-bottom:4px">';
    h+='<svg viewBox="0 0 '+svgW+' '+svgH+'" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block">';
    // guide lines
    h+='<line x1="'+padL+'" y1="'+padT+'" x2="'+(svgW-padR)+'" y2="'+padT+'" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>';
    h+='<line x1="'+padL+'" y1="'+(padT+cH/2)+'" x2="'+(svgW-padR)+'" y2="'+(padT+cH/2)+'" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>';
    h+='<line x1="'+padL+'" y1="'+(padT+cH)+'" x2="'+(svgW-padR)+'" y2="'+(padT+cH)+'" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>';
    // gradient
    h+='<defs><linearGradient id="lc7g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--acc)" stop-opacity="0.35"/><stop offset="100%" stop-color="var(--acc)" stop-opacity="0.02"/></linearGradient></defs>';
    // area
    h+='<path d="'+areaPath+'" fill="url(#lc7g)"/>';
    // line
    h+='<polyline points="'+linePts+'" fill="none" stroke="var(--acc)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    // dots + labels
    for(var j=0;j<7;j++){var dd=_7d[j],pt=pts[j];
      if(dd.p>0){
        h+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="4" fill="'+dd.tl.cr+'" stroke="#fff" stroke-width="1.5" opacity="0.9"/>';
        h+='<text x="'+pt.x+'" y="'+(pt.y-8)+'" fill="'+dd.tl.cr+'" font-size="9" font-weight="700" text-anchor="middle">'+dd.p+'%</text>';
      } else {
        h+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>';
      }
    }
    h+='</svg>';
    // day labels
    h+='<div style="display:flex;justify-content:space-between;padding:0 '+padL+'px 0 '+padL+'px">';
    for(var j=0;j<7;j++){var dd=_7d[j];h+='<span style="font-size:10px;text-align:center;flex:1;color:'+( dd.isToday?"var(--acc)":"var(--t3)")+';font-weight:'+(dd.isToday?700:400)+'">'+dd.dow+'</span>';}
    h+='</div></div></div>';
    if(D.routines.length){h+='<div class="card"><p style="font-size:10px;font-weight:700;color:var(--t2);margin-bottom:8px">🔥 '+t("rStr")+'</p>';
      D.routines.filter(function(r){return !isResting(r);}).forEach(function(r){var rs=rSk(r.id),cat=CA.find(function(c){return c.id===(r.cat||"health");})||CA[0];
        h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:10px;padding:1px 5px;border-radius:4px;background:'+cat.c+'20;color:'+cat.c+';font-weight:700">'+cat.icon+t(cat.id)+'</span><span style="font-size:10px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.name)+'</span><span style="font-size:10px;font-weight:800;color:'+(rs>0?"var(--acc)":"var(--t3)")+'">'+(rs>0?"🔥"+rs+t("dS"):"—")+'</span></div>';});
      h+='</div>';}
    var jnls=Object.keys(D.days).filter(function(k){return D.days[k].journal;}).sort().reverse().slice(0,5);
    if(jnls.length){h+='<div class="card"><p style="font-size:10px;font-weight:700;color:var(--t2);margin-bottom:8px">✍️ '+t("rNotes")+'</p>';
      jnls.forEach(function(k){var v=D.days[k];h+='<div style="padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;border-left:3px solid var(--acc);margin-bottom:6px"><p style="font-size:10px;color:var(--acc3);font-weight:600">'+fmtD(pk(k))+' '+(v.mood||"")+'</p><p style="font-size:10px;color:var(--t2);margin-top:2px;line-height:1.5">'+esc(v.journal)+'</p></div>';});
      h+='</div>';}
    h+='</div>';
  }
  ct.innerHTML=h;
  // Force browser repaint (fixes rendering bug on some devices)
  void ct.offsetHeight;
}

  var kf;
  if(dir===0){
    kf=[{left:(-off)+'px',top:startPos+'%'},{left:'calc(100% + '+off+'px)',top:startPos+'%'}];
    el.style.top=startPos+'%';el.style.left=(-off)+'px';
  } else if(dir===1){
    kf=[{right:(-off)+'px',top:startPos+'%'},{right:'calc(100% + '+off+'px)',top:startPos+'%'}];
    el.style.top=startPos+'%';el.style.right=(-off)+'px';
  } else if(dir===2){
    kf=[{top:(-off)+'px',left:startPos+'%'},{top:'calc(100% + '+off+'px)',left:startPos+'%'}];
    el.style.left=startPos+'%';el.style.top=(-off)+'px';
  } else {
    kf=[{bottom:(-off)+'px',left:startPos+'%'},{bottom:'calc(100% + '+off+'px)',left:startPos+'%'}];
    el.style.left=startPos+'%';el.style.bottom=(-off)+'px';
  }
  document.body.appendChild(el);
  el.animate(kf,{duration:dur*1000,easing:'linear',fill:'forwards'});
  el.style.opacity='1';
  setTimeout(function(){el.remove();},dur*1000+500);
  return dur;
}

// ===== Spaceship flyby =====
function spawnShip(){
  var el=document.createElement('div');
  el.className='satellite';
  var img=document.createElement('img');img.src=SHIP_IMG;el.appendChild(img);
  el.style.mixBlendMode='multiply';
  var sz=800+Math.random()*700;
  el.style.width=sz+'px';el.style.height='auto';
  var dur=180+Math.random()*120; // 180-300초 (3~5분)
  var off=sz+100;
  var dir=Math.random()<0.5?0:1;
  var startY=15+Math.random()*50;
  if(Math.random()<0.5) img.style.transform='scaleX(-1)';
  var kf;
  if(dir===0){
    kf=[{left:(-off)+'px',top:startY+'%'},{left:'calc(100% + '+off+'px)',top:startY+'%'}];
    el.style.top=startY+'%';el.style.left=(-off)+'px';
  } else {
    kf=[{right:(-off)+'px',top:startY+'%'},{right:'calc(100% + '+off+'px)',top:startY+'%'}];
    el.style.top=startY+'%';el.style.right=(-off)+'px';
  }
  document.body.appendChild(el);
  el.animate(kf,{duration:dur*1000,easing:'linear',fill:'forwards'});
  el.style.opacity='1';
  setTimeout(function(){el.remove();},dur*1000+500);
  return dur;
}

// ===== Single scheduler: rarity system =====
var satCount=0;
function spawnNext(){
  var isShip=false;
  if(satCount>=5) isShip=Math.random()<0.15; // 5개 후부터 15% 확률
  var dur;
  if(isShip){
    dur=spawnShip();
    satCount=0; // 리셋
  } else {
    dur=spawnSat();
    satCount++;
  }
  var gap=60+Math.random()*120;
  setTimeout(spawnNext,(dur+gap)*1000);
}
setTimeout(spawnNext,(5+Math.random()*10)*1000);

window.addEventListener("beforeunload",function(){saveTimers();});
load();
